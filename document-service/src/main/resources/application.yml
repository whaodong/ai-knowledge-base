server:
  port: 8081

spring:
  application:
    name: document-service
  
  # 配置中心（可选）
  config:
    import: optional:configserver:http://localhost:8888
  
  # 配置中心客户端配置
  cloud:
    config:
      enabled: false
  
  # 数据库配置
  datasource:
    url: jdbc:h2:mem:knowledgebase
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  # RabbitMQ配置（可选，用于异步处理）
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  
  # Spring AI 通义千问配置（OpenAI兼容模式）
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: sk-test-dashscope-api-key-123456
      chat:
        options:
          model: qwen-plus
          temperature: 0.7

eureka:
  client:
    # 启用Eureka客户端
    enabled: true
    # 服务注册地址
    service-url:
      defaultZone: http://localhost:8761/eureka/
    # 注册刷新间隔
    registry-fetch-interval-seconds: 30
    # 初始注册表信息获取
    should-fetch-registry: true
    # 注册到Eureka
    register-with-eureka: true
    
  instance:
    # 实例配置
    hostname: localhost
    # 使用IP地址注册
    prefer-ip-address: true
    # 实例ID格式
    instance-id: ${spring.cloud.client.hostname}:${spring.application.name}:${server.port}
    # 续约配置
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    # 状态页和健康检查URL
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.aiknowledgebase: DEBUG
    org.apache.tika: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 文档上传配置
document:
  upload:
    path: /tmp/uploads
    max-size: 10485760  # 10MB
    multimodal:
      max-size: 52428800  # 50MB

# 多模态处理配置
multimodal:
  # 图像处理配置
  image:
    ocr:
      enabled: true
      provider: tesseract  # tesseract, baidu, google
    description:
      enabled: true
      provider: gpt4v  # gpt4v, claude, local
  
  # 音频处理配置
  audio:
    asr:
      enabled: true
      provider: whisper  # whisper, baidu, aliyun
    segment:
      enabled: true
      silence-threshold: -30
      min-silence-duration: 0.5
  
  # 视频处理配置
  video:
    keyframe:
      enabled: true
      interval: 5.0  # 每5秒提取一帧
      output-dir: /tmp/keyframes
    asr:
      enabled: true
    subtitle:
      enabled: true
    description:
      enabled: true
  
  # 向量化配置
  embedding:
    text:
      model: text-embedding-3-small
    image:
      enabled: true
      model: clip-vit-base-patch32
    audio:
      enabled: true
    cross-modal:
      enabled: true
