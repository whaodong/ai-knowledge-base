# 文档服务 - 开发环境配置
server:
  port: 8081

spring:
  application:
    name: document-service
  
  # 数据库配置
  datasource:
    url: jdbc:h2:mem:documentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  
  # Redis缓存配置（开发环境使用本地Redis）
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Spring AI配置
spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-demo-key}
      chat:
        model: gpt-4
        options:
          temperature: 0.7
          max-tokens: 2000

# 服务注册与发现
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# 日志配置
logging:
  level:
    com.example.document: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE