# 向量化服务 - 开发环境配置
server:
  port: 8082

spring:
  application:
    name: embedding-service
  
  # Spring AI配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-demo-key}
      embedding:
        model: text-embedding-3-small
        options:
          dimensions: 1536
  
  # 服务注册与发现
  cloud:
    discovery:
      enabled: true

# 向量数据库配置（开发环境使用内存模拟）
embedding:
  storage:
    type: memory
    dimension: 1536
    max-items: 10000

# 性能配置
performance:
  batch-size: 32
  timeout-ms: 30000
  retry-attempts: 3

# 服务注册与发现
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# 日志配置
logging:
  level:
    com.example.embedding: DEBUG
    org.springframework.ai: INFO