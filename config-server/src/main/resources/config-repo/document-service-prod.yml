# 文档服务 - 生产环境配置
server:
  port: 8080

spring:
  application:
    name: document-service
  
  # 数据库配置（生产环境使用高可用MySQL集群）
  datasource:
    url: jdbc:mysql:replication://master-mysql:3306,slave-mysql:3306/document_db?useSSL=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          batch_size: 50
  
  # Redis缓存配置（生产环境使用哨兵模式）
  data:
    redis:
      sentinel:
        master: redis-master
        nodes:
          - sentinel-1:26379
          - sentinel-2:26379
          - sentinel-3:26379
      password: ${REDIS_PASSWORD}
      database: 0
  
  # 文件上传配置（生产环境较大限制）
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# Spring AI配置
spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: gpt-4-turbo
        options:
          temperature: 0.3
          max-tokens: 8000
          top-p: 0.95
          frequency-penalty: 0.1
          presence-penalty: 0.1

# 服务注册与发现
eureka:
  client:
    service-url:
      defaultZone: http://prod-eureka-1:8761/eureka/,http://prod-eureka-2:8762/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    metadata-map:
      zone: ${ZONE:zone1}

# 生产环境监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: never

# 生产环境安全配置
security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000  # 24小时