# 企业级知识库系统 - 全局共享配置
# 此配置会被所有服务继承，可通过环境特定配置覆盖

# 系统全局配置
system:
  name: AI知识库系统
  version: 1.0.0
  description: 基于Spring Cloud + Spring AI + Milvus的企业级知识库系统
  
  # 超时配置（毫秒）
  timeouts:
    http-request: 10000
    database-query: 5000
    external-api: 15000
  
  # 重试配置
  retry:
    max-attempts: 3
    backoff-delay: 1000
    multiplier: 1.5

# Spring Cloud配置
spring:
  cloud:
    # 负载均衡配置
    loadbalancer:
      ribbon:
        enabled: false
      cache:
        enabled: true
        ttl: 30s
    
    # 熔断器配置
    circuitbreaker:
      enabled: true
      resilience4j:
        enabled: true
        instances:
          default:
            sliding-window-size: 10
            failure-rate-threshold: 50
            wait-duration-in-open-state: 5s
            permitted-number-of-calls-in-half-open-state: 3
    
    # 配置中心客户端
    config:
      enabled: true
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1

# 监控与可观测性
management:
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active:dev}
  
  tracing:
    sampling:
      probability: 1.0

# 安全配置（JWT）
security:
  jwt:
    header: Authorization
    prefix: Bearer
    expiration: 86400000  # 24小时
    refresh-expiration: 604800000  # 7天

# API文档配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    default-model-expand-depth: 2
    display-request-duration: true
  
  packages-to-scan: com.example
  
  # 全局响应消息
  default-response-messages:
    GET:
      - code: 200
        message: 成功
      - code: 400
        message: 请求参数错误
      - code: 401
        message: 未授权
      - code: 500
        message: 服务器内部错误

# 日志统一配置
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  
  file:
    name: logs/${spring.application.name}.log
    max-size: 10MB
    max-history: 30
  
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate: WARN
    com.example: DEBUG