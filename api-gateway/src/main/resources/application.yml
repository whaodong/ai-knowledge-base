server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  # 配置中心（可选）
  config:
    import: optional:configserver:http://localhost:8888
  
  cloud:
    # 网关配置
    gateway:
      # 默认过滤器配置
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      
      # 路由配置
      routes:
        # 前端直连文档服务路由（兼容/api/v1前缀）
        - id: document-service-api-v1
          uri: lb://document-service
          predicates:
            - Path=/api/v1/documents/**
          filters:
            - name: RequestLoggingFilter
              args:
                enabled: true
                log-headers: false
            - name: AuthenticationFilter
              args:
                enabled: true
                require-auth: true

        # 前端直连向量化服务路由（兼容/api/v1前缀）
        - id: embedding-service-api-v1
          uri: lb://embedding-service
          predicates:
            - Path=/api/v1/embeddings/**
          filters:
            - name: RequestLoggingFilter
              args:
                enabled: true
                log-headers: false
            - name: AuthenticationFilter
              args:
                enabled: true
                require-auth: true

        # 前端直连RAG服务路由（兼容/api/v1前缀）
        - id: rag-service-api-v1
          uri: lb://rag-service
          predicates:
            - Path=/api/v1/rag/**
          filters:
            - name: RequestLoggingFilter
              args:
                enabled: true
                log-headers: false
            - name: AuthenticationFilter
              args:
                enabled: true
                require-auth: true

        # 前端直连Token服务路由（兼容/api/v1前缀）
        - id: token-service-api-v1
          uri: lb://rag-service
          predicates:
            - Path=/api/v1/tokens/**
          filters:
            - name: RequestLoggingFilter
              args:
                enabled: true
                log-headers: false
            - name: AuthenticationFilter
              args:
                enabled: true
                require-auth: true

        # 前端直连向量检索服务路由（兼容/api/v1前缀）
        - id: milvus-service-api-v1
          uri: lb://milvus-service
          predicates:
            - Path=/api/v1/vectors/**
          filters:
            - name: RequestLoggingFilter
              args:
                enabled: true
                log-headers: false
            - name: AuthenticationFilter
              args:
                enabled: true
                require-auth: true

        # 前端直连索引管理服务路由（兼容/api前缀）
        - id: milvus-index-api
          uri: lb://milvus-service
          predicates:
            - Path=/api/index/**
          filters:
            - name: RequestLoggingFilter
              args:
                enabled: true
                log-headers: false
            - name: AuthenticationFilter
              args:
                enabled: true
                require-auth: true

        # 文档服务路由
        - id: document-service
          uri: lb://document-service
          predicates:
            - Path=/document-service/**
          filters:
            - StripPrefix=1
            - name: RequestLoggingFilter
              args:
                enabled: true
                log-headers: false
            - name: AuthenticationFilter
              args:
                enabled: true
                require-auth: true
          metadata:
            response-timeout: 10000
            connect-timeout: 5000
        
        # 向量化服务路由
        - id: embedding-service
          uri: lb://embedding-service
          predicates:
            - Path=/embedding-service/**
          filters:
            - StripPrefix=1
            - name: RequestLoggingFilter
              args:
                enabled: true
                log-headers: false
            - name: AuthenticationFilter
              args:
                enabled: true
                require-auth: true
        
        # RAG服务路由
        - id: rag-service
          uri: lb://rag-service
          predicates:
            - Path=/rag-service/**
          filters:
            - StripPrefix=1
            - name: RequestLoggingFilter
              args:
                enabled: true
                log-headers: false
            - name: AuthenticationFilter
              args:
                enabled: true
                require-auth: true

        # 认证接口路由（透传到RAG服务中公共认证控制器）
        - id: auth-service
          uri: lb://rag-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestLoggingFilter
              args:
                enabled: true
                log-headers: false
            - name: AuthenticationFilter
              args:
                enabled: true
                require-auth: false
        
        # 配置中心路由（直接访问）
        - id: config-server
          uri: lb://config-server
          predicates:
            - Path=/config/**
          filters:
            - StripPrefix=1
        
        # 服务注册中心路由
        - id: eureka-server
          uri: http://localhost:8761
          predicates:
            - Path=/eureka/**
        
        # API文档路由（聚合所有服务的Swagger）
        - id: api-docs
          uri: lb://document-service
          predicates:
            - Path=/api-docs/**
          filters:
            - RewritePath=/api-docs/(?<segment>.*), /$\{segment}/v3/api-docs
        
        # Swagger UI路由
        - id: swagger-ui
          uri: http://localhost:8080
          predicates:
            - Path=/swagger-ui.html
          filters:
            - SetPath=/swagger-ui.html
      
      # 全局配置
      httpclient:
        connect-timeout: 5000
        response-timeout: 10000
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
    
    # 配置中心客户端
    config:
      enabled: true
      uri: http://localhost:8888
      name: api-gateway
      profile: dev
      label: main
      fail-fast: true

# 服务注册与发现
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,routes
      base-path: /actuator
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    gateway:
      enabled: true
    routes:
      enabled: true
    health:
      show-details: always

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.example.apigateway: DEBUG
    reactor.netty: INFO
